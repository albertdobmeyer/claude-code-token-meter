name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      # Pinned to SHA for supply-chain integrity. Bump via Dependabot or
      # by replacing the SHA + comment together — never one without the other.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: node token-meter.mjs --help
      - run: node token-meter.mjs --agents
      - run: npm pack --dry-run
